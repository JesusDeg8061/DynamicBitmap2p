<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAS DE BARRIL</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

h1{
    text-align:center;
    padding:15px;
}

.topbar{
    display:flex;
    justify-content:center;
    gap:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

/* MESAS */
#mesas{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding:10px;
}

/* MENU */
#menu{
    position:fixed;
    bottom:0;
    width:100%;
    max-width:520px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    color:black;
    padding:20px;
    border-radius:20px 20px 0 0;
    box-shadow:0 -5px 20px rgba(0,0,0,0.4);
}

/* INPUTS */
input, select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

/* LISTA */
#lista{
    max-height:180px;
    overflow:auto;
    padding:10px;
    border-radius:10px;
    background:transparent;
}

/* ITEM */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:8px;
    border-radius:8px;
    margin-bottom:6px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* BOTONES */
.add{background:#22c55e;}
.custom{background:#9333ea;}
.print{background:#3b82f6;}
.finish{background:#ef4444;}

.actions{
    display:flex;
    gap:8px;
}

.actions button{
    flex:1;
}

/* TOTAL */
.total{
    margin-top:10px;
    padding:10px;
    background:#111827;
    color:white;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🍺 LAS DE BARRIL</h1>

<div class="topbar">
    <button onclick="crearMesa()">➕ Nueva Mesa</button>
    <button onclick="finalizarDia()">📊 Finalizar Día</button>
</div>

<div id="mesas"></div>

<div id="menu">
    <h3 id="tituloMesa"></h3>

    <input id="mesero" placeholder="Mesero">

    <select id="categoria" onchange="cargarProductos()">
        <option value="cerveza">Cerveza</option>
        <option value="cocteleria">Coctelería</option>
        <option value="comida">Comida</option>
        <option value="refrescos">Refrescos</option>
    </select>

    <select id="producto"></select>

    <input type="number" id="cantidad" value="1">

    <div style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="servicio">
        <label>Servicio 10%</label>
    </div>

    <input id="customNombre" placeholder="Producto personalizado">
    <input id="customPrecio" type="number" placeholder="Precio">

    <div id="lista"></div>

    <div class="total" id="total"></div>

    <div class="actions">
        <button class="add" onclick="agregar()">Agregar</button>
        <button class="custom" onclick="agregarCustom()">+ Personalizado</button>
        <button class="print" onclick="imprimir()">Imprimir</button>
        <button class="finish" onclick="finalizar()">Cerrar</button>
    </div>
</div>

<script>

const menu = {
    cerveza:["Cerveza Litro (70)", "Cerveza Medio Litro (50)","Caguama (90)","Mega Cerveza (90)"],
    cocteleria:["Mojito Litro (95)", "Mojito Medio Litro (70)","Pitufo Litro (95)", "Pitufo Medio Litro (70)","Pitufina Litro (95)", "Pitufina Medio Litro (70)","Moradito Litro (95)", "Moradito Medio Litro (70)","Piña Colada Litro (95)", "Piña Colada Medio Litro (70)","Paloma Litro (95)", "Paloma Medio Litro (70)","Quemaditas Litro (95)", "Quemaditas Medio Litro (70)","Tequilibrio Litro (95)", "Tequilibrio Medio Litro (70)","Smirnoff Litro (95)", "Smirnoff Medio Litro (70)","Mezcalita Litro (95)", "Mezcalita Medio Litro (70)"],
    comida:["Hamburguesa (90)", "Papas (50)","Salchipapa (50)","Boneless (100)","Alitas (100)","Dedos de queso (80)","Banderillas coreanas (80),","Nachos (60)"],
    refrescos:["Refresco (30)", "Soda italiana Litro (60)","Soda italiana Medio Litro (45)","Skimos y Frapes Medio Litro (70)"]
};

let ventas = JSON.parse(localStorage.getItem("ventas")) || {};
let contadorMesas = JSON.parse(localStorage.getItem("contadorMesas")) || 0;
let mesaActual = null;

function guardar(){
    localStorage.setItem("ventas", JSON.stringify(ventas));
    localStorage.setItem("contadorMesas", contadorMesas);
}

/* MESAS */
function crearMesa(){
    contadorMesas++;
    ventas[contadorMesas]=[];
    guardar();
    renderMesas();
}

function renderMesas(){
    let cont=document.getElementById("mesas");
    cont.innerHTML="";
    Object.keys(ventas).forEach(m=>{
        let b=document.createElement("button");
        b.innerText="Mesa "+m;
        b.onclick=()=>abrir(m);
        cont.appendChild(b);
    });
}

/* ABRIR */
function abrir(m){
    mesaActual=m;
    document.getElementById("tituloMesa").innerText="Mesa "+m;
    document.getElementById("menu").style.display="block";
    cargarProductos();
    renderLista();
}

/* PRODUCTOS */
function cargarProductos(){
    producto.innerHTML="";
    menu[categoria.value].forEach(p=>{
        producto.innerHTML+=`<option>${p}</option>`;
    });
}

/* AGREGAR */
function agregar(){
    let prod=producto.value;
    let cant=+cantidad.value;
    let precio=+prod.match(/\((\d+)\)/)[1];

    ventas[mesaActual].push({
        prod,
        cant,
        subtotal:precio*cant
    });

    guardar();
    renderLista();
}

/* PERSONALIZADO */
function agregarCustom(){
    let nombre=customNombre.value;
    let precio=+customPrecio.value;

    if(!nombre || !precio) return;

    ventas[mesaActual].push({
        prod:nombre,
        cant:1,
        subtotal:precio
    });

    guardar();
    renderLista();
}

/* LISTA */
function renderLista(){
    let cont=document.getElementById("lista");
    let data=ventas[mesaActual]||[];

    cont.innerHTML="";

    if(data.length===0){
        cont.style.background="transparent";
        total.innerHTML="";
        return;
    }

    cont.style.background="#f1f5f9";

    let subtotal=0;

    data.forEach((v,i)=>{
        subtotal+=v.subtotal;

        cont.innerHTML+=`
        <div class="item">
            <span>${v.cant} x ${v.prod}</span>
            <span>$${v.subtotal.toFixed(2)}</span>
            <button onclick="eliminar(${i})" style="background:red;">X</button>
        </div>`;
    });

    let propina = servicio.checked ? subtotal*0.1 : 0;
    let totalFinal = subtotal + propina;

    total.innerHTML=`
    Subtotal: $${subtotal.toFixed(2)}<br>
    Propina: $${propina.toFixed(2)}<br>
    TOTAL: $${totalFinal.toFixed(2)}
    `;
}

document.getElementById("servicio").addEventListener("change", renderLista);

/* ELIMINAR */
function eliminar(i){
    ventas[mesaActual].splice(i,1);
    guardar();
    renderLista();
}

/* IMPRIMIR */
function imprimir(){

    let data=ventas[mesaActual];
    let meseroNombre=mesero.value||"N/A";

    if(!data || data.length===0){
        alert("Sin ventas");
        return;
    }

    let subtotal=data.reduce((a,v)=>a+v.subtotal,0);
    let propina=servicio.checked ? subtotal*0.1 : 0;
    let total=subtotal+propina;

    let html=`<div style="width:48mm;font-family:monospace;font-size:10px">

    <center>
    Las De Barril - Snack Bar<br>
    Calle Aztecas S/N, Toluca<br>
    Edo. Méx, C.P. 51355
    </center>

    ---------------------------------<br>
    Mesa: ${mesaActual}   Mesero: ${meseroNombre}<br>
    ---------------------------------<br>
    CANT  DESCRIPCIÓN     IMPORTE<br>
    ---------------------------------<br>
    `;

    data.forEach(v=>{
        let nombre=v.prod.replace(/\(\d+\)/,"");
        html+=`${v.cant}   ${nombre.substring(0,12)}   $${v.subtotal.toFixed(2)}<br>`;
    });

    html+=`
    ---------------------------------<br>
    SUBTOTAL: $${subtotal.toFixed(2)}<br>
    SERVICIO:  $${propina.toFixed(2)}<br>
    TOTAL:    $${total.toFixed(2)}<br>
    ---------------------------------
    ---------------------------------<br>
    El servicio es opcional no obligatorio<br>
    ---------------------------------<br>
    ---------------------------------<br>
    Este no es un comprobante fiscal<br>
    ---------------------------------<br>
    ---------------------------------<br>
    GRACIAS POR SU PREFERENCIA!!!!! <br>
    ---------------------------------<br>
    </div>`;

    let iframe=document.createElement("iframe");
    iframe.style.display="none";
    document.body.appendChild(iframe);

    let doc=iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();

    iframe.contentWindow.print();

    setTimeout(()=>iframe.remove(),1000);
}

/* FINALIZAR */
function finalizar(){
    delete ventas[mesaActual];
    guardar();
    renderMesas();
    document.getElementById("menu").style.display="none";
}

/* CORTE */
function finalizarDia(){

    if(!confirm("¿Cerrar día?")) return;

    let totalDia=0;
    let totalPropina=0;

    for(let m in ventas){
        ventas[m].forEach(v=>{
            totalDia+=v.subtotal;
        });
    }

    totalPropina = totalDia*0.1;

    let txt=`LAS DE BARRIL - CORTE
---------------------------
Ventas: $${totalDia.toFixed(2)}
Propina: $${totalPropina.toFixed(2)}
TOTAL: $${(totalDia+totalPropina).toFixed(2)}
`;

    let blob=new Blob([txt]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="corte.txt";
    a.click();

    localStorage.clear();
    location.reload();
}

renderMesas();

</script>

</body>
</html>
